name: nodejs-inspect
language: nodejs
image: node:20
debug_interface: inspector
ports:
  - 9229:9229
caps:
  - SYS_PTRACE
security_opt:
  - seccomp=unconfined
workload:
  type: http_server
  duration_secs: 30
kpi_thresholds:
  cpu_overhead_pct: 12.0
  memory_overhead_mb: 64.0
  capture_latency_p99_ms: 150.0
  events_per_sec_min: 400
scenarios:
  - name: attach_and_capture
    description: Attach Node inspector and capture events
    timeout_secs: 60
  - name: breakpoint_hit
    description: Set breakpoint and verify hit detection
    timeout_secs: 30
