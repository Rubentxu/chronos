name: java-ptrace
language: java
image: eclipse-temurin:21-jdk
debug_interface: jdwp
ports:
  - 5005:5005
caps:
  - SYS_PTRACE
security_opt:
  - seccomp=unconfined
workload:
  type: http_server
  duration_secs: 30
kpi_thresholds:
  cpu_overhead_pct: 10.0
  memory_overhead_mb: 128.0
  capture_latency_p99_ms: 150.0
  events_per_sec_min: 500
scenarios:
  - name: attach_and_capture
    description: Attach Java debugger and capture events
    timeout_secs: 60
  - name: breakpoint_hit
    description: Set breakpoint and verify hit detection
    timeout_secs: 30
