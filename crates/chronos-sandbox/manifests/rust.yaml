name: rust-ptrace
language: rust
image: rust:1.77
debug_interface: ptrace
ports: []
caps:
  - SYS_PTRACE
security_opt:
  - seccomp=unconfined
workload:
  type: cpu_loop
  duration_secs: 30
kpi_thresholds:
  cpu_overhead_pct: 5.0
  memory_overhead_mb: 50.0
  capture_latency_p99_ms: 100.0
  events_per_sec_min: 1000
scenarios:
  - name: attach_and_capture
    description: Attach to running Rust process and capture events
    timeout_secs: 60
  - name: watchpoint_hit
    description: Set hardware watchpoint and verify hit detection
    timeout_secs: 30
