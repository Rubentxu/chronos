name: python-ptrace
language: python
image: python:3.12
debug_interface: debugpy
ports:
  - 5678:5678
caps:
  - SYS_PTRACE
security_opt:
  - seccomp=unconfined
workload:
  type: http_server
  duration_secs: 30
kpi_thresholds:
  cpu_overhead_pct: 15.0
  memory_overhead_mb: 64.0
  capture_latency_p99_ms: 200.0
  events_per_sec_min: 300
scenarios:
  - name: attach_and_capture
    description: Attach debugpy and capture events
    timeout_secs: 60
  - name: breakpoint_hit
    description: Set breakpoint and verify hit detection
    timeout_secs: 30
